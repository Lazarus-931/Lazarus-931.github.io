article {
    max-width: 720px;
    margin: 2.5em auto;
    line-height: 1.6;
    background: var(--bg);
    border: 1px solid var(--text);

}

.note-title {
    font-size: 2em;

    margin-bottom: 0.3em;

}

.note-date {

    font-size: 0.9em;
    margin-bottom: 3em;
}

.note-content {

}

.note-content p {
    margin-bottom: 1.5em;
}

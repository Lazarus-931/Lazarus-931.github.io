<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alazer Manakelew</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            background-color: #fff;
            color: #333;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 180px;
            background: #fafafa;
            border-right: 1px solid #eee;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-link {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .nav-link:hover {
            background: #f0f0f0;
            color: #1abc9c;
        }

        /* Main content */
        .content {
            flex: 1;
            padding: 60px;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .intro {
            flex: 1;
        }

        .name {
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .info {
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #555;
        }

        .flags {
            font-size: 1em;
            color: #666;
            font-style: italic;
        }

        .profile-section {
            flex: 1;
            text-align: center;
        }

        .profile-img {
            max-width: 260px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 10px;
        }

        .figure-caption {
            font-style: italic;
            color: #777;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                flex-direction: row;
                justify-content: center;
                border-right: none;
                border-bottom: 1px solid #eee;
            }

            .content {
                flex-direction: column;
                padding: 30px 20px;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <a href="writings.html" class="nav-link">Writings</a>
            <a href="things.html" class="nav-link">Things</a>
            <a href="reach.html" class="nav-link">Reach Me</a>
        </nav>

        <!-- Main Content -->
        <div class="content">
            <div class="intro">
                <h1 class="name">Alazer Manakelew</h1>
                <p class="info">I go to Northeastern for CS.</p>
                <p class="flags">{🇪🇹: Born, 🇺🇸: Raised}</p>
            </div>
            <div class="profile-section">
                <img src="/assets/prof_pic.jpg" alt="Me!" class="profile-img">
                <p class="figure-caption"><strong>Figure 1.1</strong> Me, circa 2025.</p>
            </div>
        </div>
    </div>
</body>

</html>

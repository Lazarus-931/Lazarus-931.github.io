<meta charset="utf-8">
<link rel="stylesheet" href="../assets/theme.css">
<script src="../assets/theme.js"></script>

<style>
    .md h1:before, .md h2:before, .md h3:before { content: none; }

    article {
        max-width: 650px;
        margin: 0 auto;
        line-height: 1.6;
    }

    .blog-title {
        font-size: 2em;
        font-weight: normal;
        margin-bottom: 0.3em;
        text-align: center;
    }

    .blog-tagline {
        text-align: center;
        color: var(--muted);
        font-size: 0.95em;
        font-style: italic;
        margin-bottom: 1.2em;
    }

    .blog-rule {
        border: 0;
        border-top: 1px solid var(--border, #e5e5e7);
        margin: 0 auto 3em;
        max-width: 480px;
    }

    .blog-content {
        color: var(--text);
    }

    .blog-content p {
        margin-bottom: 1.5em;
    }
</style>

<article>

    <div class="blog-title">Links</div>
    <div class="blog-tagline">some stuff i bookmarked</div>
    <hr class="blog-rule">

    <div class="blog-content">
    </div>

</article>

<script>
    window.markdeepOptions = {
        tocStyle: 'none'
    };
</script>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Audio Player</title>
        <style>
            /* General styling for the page */
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #f0f0f0;
                margin: 0;
                font-family: sans-serif;
            }

            /* Styling for the audio button container */
            .audio-container {
                text-align: center;
            }

            /* Base styles for the play/pause button */
            #audioBtn {
                background: #2196f3; /* Blue background */
                border: none;
                border-radius: 50%; /* Makes the button circular */
                width: 70px;
                height: 70px;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
                transition: all 0.3s ease;
            }

            #audioBtn:hover {
                transform: scale(1.1);
                background-color: #1976d2; /* Darker blue on hover */
            }

            /* Styling for the play/pause icon inside the button */
            .icon {
                width: 0;
                height: 0;
                box-sizing: border-box;
                transition: all 0.2s ease;
            }

            /* The "Play" triangle shape */
            .play .icon {
                border-top: 15px solid transparent;
                border-bottom: 15px solid transparent;
                border-left: 25px solid white;
                margin-left: 5px;
            }

            /* The "Pause" bars shape */
            .pause .icon {
                border-left: 8px solid white;
                border-right: 8px solid white;
                height: 30px;
                width: 25px; /* Total width including borders */
            }

            .playing .play .icon {
                display: none;
            }
            .playing .pause .icon {
                display: block;
            }

            .pause .icon {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="audio-container">
            <button id="audioBtn">
                <span class="play">
                    <span class="icon"></span>
                </span>
                <span class="pause">
                    <span class="icon"></span>
                </span>
            </button>
        </div>

        <audio id="audioPlayer" preload="auto">
            <source src="time.mp3" type="interstellar_theme.mp3" />
            Your browser does not support the audio element.
        </audio>

        <script>
            const audioBtn = document.getElementById("audioBtn");
            const audioPlayer = document.getElementById("audioPlayer");

            audioBtn.addEventListener("click", () => {
                if (audioPlayer.paused) {
                    audioPlayer.play();
                    audioBtn.classList.add("playing");
                } else {
                    audioPlayer.pause();
                    audioBtn.classList.remove("playing");
                }
            });

            audioPlayer.addEventListener("ended", () => {
                audioBtn.classList.remove("playing");
            });
        </script>
    </body>
</html>
